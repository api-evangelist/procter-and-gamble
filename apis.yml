aid: procter-and-gamble
name: Procter & Gamble
description: >-
  Procter & Gamble (P&G) is one of the world's largest consumer goods companies, with a portfolio of trusted brands
  across beauty, grooming, health care, fabric and home care, and baby, feminine, and family care. P&G operates an API
  Marketplace at developer.pg.com that provides partners, suppliers, and developers with programmatic access to P&G
  systems for integrating with the company's supply chain, product data, and business operations.
