created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Consumer Goods
  - Retail
  - Supply Chain
description: Procter & Gamble is a consumer-packaged-goods manufacturer. There is no public developer
  portal, no API pricing, and no consumer-facing API plans. Any data exchange is partner / supplier /
  retailer integration governed by contract.
notes: P&G does not publish API plans or pricing. Reconciliation reduced the scaffold to a single Contact
  Sales plan to avoid fabricating tier prices.
sources:
  - https://us.pg.com/
plans:
  - id: procter-and-gamble-contact-sales
    name: Contact Sales
    type: enterprise
    description: Partner / supplier / retailer integration negotiated with P&G. Access, quotas, and pricing
      are contractual and not published.
    entries:
      - label: Negotiated Access
        name: negotiated_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Partner Integration
      - name: Contractual SLA
