naftiko: 1.0.0-alpha2
info:
  label: Procter & Gamble API Marketplace
  description: The Procter & Gamble API Marketplace provides access to P&G's suite of APIs for partners, suppliers, and developers.
    The platform enables integration with P&G's supply chain, product data, and business operations for building applications
    that interact with P&G systems.
  tags:
  - Procter
  - And
  - Gamble
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: procter-and-gamble
    baseUri: https://developer.pg.com/api
    description: Procter & Gamble API Marketplace HTTP API.
    authentication:
      type: bearer
      token: '{{PROCTER_AND_GAMBLE_TOKEN}}'
    resources:
    - name: products
      path: /products
      operations:
      - name: listproducts
        method: GET
        description: List products
        inputParameters:
        - name: brand
          in: query
          type: string
          description: Filter by brand name.
        - name: category
          in: query
          type: string
          description: Filter by product category.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: supply-chain-shipments
      path: /supply-chain/shipments
      operations:
      - name: listshipments
        method: GET
        description: List shipments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders
      path: /orders
      operations:
      - name: listorders
        method: GET
        description: List orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: procter-and-gamble-rest
    description: REST adapter for Procter & Gamble API Marketplace.
    resources:
    - path: /products
      name: listproducts
      operations:
      - method: GET
        name: listproducts
        description: List products
        call: procter-and-gamble.listproducts
        outputParameters:
        - type: object
          mapping: $.
    - path: /supply-chain/shipments
      name: listshipments
      operations:
      - method: GET
        name: listshipments
        description: List shipments
        call: procter-and-gamble.listshipments
        outputParameters:
        - type: object
          mapping: $.
    - path: /orders
      name: listorders
      operations:
      - method: GET
        name: listorders
        description: List orders
        call: procter-and-gamble.listorders
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: procter-and-gamble-mcp
    transport: http
    description: MCP adapter for Procter & Gamble API Marketplace for AI agent use.
    tools:
    - name: listproducts
      description: List products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procter-and-gamble.listproducts
      with:
        brand: tools.brand
        category: tools.category
      inputParameters:
      - name: brand
        type: string
        description: Filter by brand name.
      - name: category
        type: string
        description: Filter by product category.
      outputParameters:
      - type: object
        mapping: $.
    - name: listshipments
      description: List shipments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procter-and-gamble.listshipments
      outputParameters:
      - type: object
        mapping: $.
    - name: listorders
      description: List orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procter-and-gamble.listorders
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    PROCTER_AND_GAMBLE_TOKEN: PROCTER_AND_GAMBLE_TOKEN
