naftiko: 1.0.0-alpha2
info:
  label: Procter & Gamble API Marketplace — Orders
  description: 'Procter & Gamble API Marketplace — Orders. 1 operations. Lead operation: List orders. Self-contained Naftiko
    capability covering one Procter And Gamble business surface.'
  tags:
  - Procter And Gamble
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PROCTER_AND_GAMBLE_API_KEY: PROCTER_AND_GAMBLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: api-marketplace-orders
    baseUri: https://developer.pg.com/api
    description: Procter & Gamble API Marketplace — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: listorders
        method: GET
        description: List orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PROCTER_AND_GAMBLE_API_KEY}}'
  exposes:
  - type: rest
    namespace: api-marketplace-orders-rest
    port: 8080
    description: REST adapter for Procter & Gamble API Marketplace — Orders. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: GET
        name: listorders
        description: List orders
        call: api-marketplace-orders.listorders
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: api-marketplace-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Procter & Gamble API Marketplace — Orders. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-orders
      description: List orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-marketplace-orders.listorders
      outputParameters:
      - type: object
        mapping: $.
